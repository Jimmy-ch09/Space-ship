<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceship</title>
    <link href="style.css" rel="stylesheet">

</head>
<body onkeydown="_keydown(event);" onkeyup="_keyup(event);" >
    <img src="images/misteryman.png" id="fondo">
    <canvas class="zona" id="canvas" width="1000" height="1000"></canvas>
    <script>

        class Bullet {
            x; y; vy; vx; w; h;
            constructor(x, y, vx, vy) {
                this.w=4; this.h=15;
                this.x=x; this.y=y;
                this.vx=vx; this.vy=vy;
            }
            draw() {
                ctx.fillStyle = 'rgb(150, 207, 216)';
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
            move() {
                this.x += this.vx;
                this.y += this.vy;
            }
        }
        class whiteBone {
            x; y; vy; vx; w; h;
            constructor(x, y, vx, vy) {
                this.w=16; this.h=50;
                this.x=x; this.y=y;
                this.vx=vx; this.vy=vy;
            }
            draw() {
                ctx.drawImage(boneImage, this.x, this.y, this.w, this.h);
            }
            move() {
                this.x += this.vx;
                this.y += this.vy;
                let left   = -canvas.width/2 + this.w/2;
                let right  = canvas.width/2 - this.w/2;
                let top    = -canvas.height/2 + this.h/2;
                let bottom = canvas.height/2 - this.h/2;

                if (this.x< left) this.x=left;
                if (this.x> right) this.x=right;
                if (this.y< top) this.y=top;
                if (this.y> bottom) this.y=bottom;
                
                //collisione per sparire ora per sparire
            }
        }
        //nemici
        class Enemy{
            
            
        }
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const SPEED=6;
        
        //audio
        const audioBattle= new Audio("sonds/callofthevoid.mp3");
        const audioBone= new Audio("sounds/bone-sound.mp3");
        const audioDamage= new Audio("sounds/damage-sound.mp3");
        //Immagini
        const spazioBack=new Image();
        spazioBack.src="Backgrounds/Stars_background_Black.png"//fondo

        const soulImage = new Image();
        soulImage.src="images/soul.png";//soul

        const boneImage= new Image();
        boneImage.src="images/bone.png";

        const background = new Image();
        background.src = "Backgrounds/FallingStar.png";//Stella cadente


        const box = {
            x: 400,
            y: 400,
            width: 400,
            height: 400,
            angle: 0,
            draw: function(ctx){
                ctx.strokeStyle = "gray";
                ctx.lineWidth = 4;
                ctx.strokeRect(-this.width/2, -this.height/2, this.width, this.height);
            }

            };
        //stato nel gioco/soul
        const hp=92;
        let Smovimento="";
        const typeSoul=["images/soul.png","images/bsoul.png"];




        function randomInt(a, b) {
            return Math.floor(Math.random() * (b - a + 1)) + a;
        }  

        let typeBullet=Bullet;
        
        //Presa dei movimenti (aggiustato)
        function _keydown(e) {
            switch (e.key) {
                case 'a':
                case 'ArrowLeft':
                    soul.vx=-SPEED;
                    Smovimento=true;
                    break;
                case 'd':
                case 'ArrowRight':
                    soul.vx=SPEED;
                    Smovimento=true;
                    break;
                case 'w':
                case 'ArrowUp':
                    soul.vy=-SPEED;
                    Smovimento=true;
                    break;
                case 's':
                case 'ArrowDown':
                    soul.vy=SPEED;
                    Smovimento=true;
                    break;
                case ' ':
                    audioBone.play();
                    soul.fire();
                    break;
                case 'q':
                    typeBullet=Bullet;
                    break;
                case 'e':
                    typeBullet=whiteBone;
                    break;
            }
        }

        function _keyup(e) {
            switch (e.key) {
                case 'a':
                case 'ArrowLeft':
                    if (soul.vx < 0) soul.vx = 0;
                    Smovimento=false;
                    break;
                case 'd':
                case 'ArrowRight':
                    if (soul.vx > 0) soul.vx = 0;
                    Smovimento=false;
                    break;
                case 'w':
                case 'ArrowUp':
                    if (soul.vy < 0) soul.vy = 0;
                    Smovimento=false;
                    break;
                case 's':
                case 'ArrowDown':
                    if (soul.vy > 0) soul.vy = 0;
                    Smovimento=false;
                    break;
            }
        }

        const bone={
            x:0, y:0, w:60, h:120, 
            vx:0, vy:0,
            draw: function(ctx) {
                ctx.drawImage(boneImage, this.x - this.w/2, this.y - this.h/2, this.w, this.h)
            },


        }

        //Soul (rinominato da ship)

        const soul = {
            x:0, y:0, w:40, h:40, 
            vx:0, vy:0,hp:92,timerHit:0,
            bullets:[],//forse ancora utile
            draw: function(ctx) {
                ctx.drawImage(soulImage, this.x - this.w/2, this.y - this.h/2, this.w, this.h);
                this.bullets.forEach( (y)=>{
                    y.draw(ctx);
               } );
            },
            
            move: function(ctx) {
                //if (this.x>box.width && this.x>=box.width || this.y>=box.height){
                this.x += this.vx;
                this.y += this.vy;
                let left   = -box.width/2 + this.w/2;
                let right  = box.width/2 - this.w/2;
                let top    = -box.height/2 + this.h/2;
                let bottom = box.height/2 - this.h/2;

                if (this.x< left) this.x=left;
                if (this.x> right) this.x=right;
                if (this.y< top) this.y=top;
                if (this.y> bottom) this.y=bottom;

                if (this.x==bone.x && this.y==bone.y) {
                    let now=Date.now();
                    if (now-this.timerHit>100){
                        this.hp-=1;
                        this.timerHit=now;
                        console.log(this.hp,this.timerHit);
                        let sound = audioDamage.cloneNode();
                        sound.play();
                        if (this.hp==0) console.log("Game over");
                    };
                    

                } ;
                this.bullets.forEach( (y)=>{
                    y.move(ctx);
                } );

                
            },
            fire: function() {
                let b=new typeBullet(this.x, this.y, 0, -3);
                this.bullets.push(b);
            }
        }
        
        function attackA() {
            bullets=[];
            let x = randomInt(-box.width/2, box.width/2);
            let y = -box.height/2;
            bullets.push(new typeBullet(x, y, 0, 3));



        }
        let bones = [];
        function spawnHorizontalLine() {
            for (let i = -box.width/2; i <= box.width/2; i += 40) {
                bones.push(new whiteBone(i, -box.height/2, 0, 2));
            }
        }

        //let b=new Bullet(ship.x+ship.w/2,ship.y,0,-3);

        //Grafica del gioco

        //Bgdata= stella cadente
        const bgData = {
            frames: {
                "FallingStar_Sprites0.png": { frame: { x: 0,   y: 0,   w: 128, h: 128 } },
                "FallingStar_Sprites1.png": { frame: { x: 128, y: 0,   w: 128, h: 128 } },
                "FallingStar_Sprites2.png": { frame: { x: 256, y: 0,   w: 128, h: 128 } },
                "FallingStar_Sprites3.png": { frame: { x: 0,   y: 128, w: 128, h: 128 } },
                "FallingStar_Sprites4.png": { frame: { x: 128, y: 128, w: 128, h: 128 } },
                "FallingStar_Sprites5.png": { frame: { x: 256, y: 128, w: 128, h: 128 } },
                "FallingStar_Sprites6.png": { frame: { x: 0,   y: 256, w: 128, h: 128 } },
                "FallingStar_Sprites7.png": { frame: { x: 128, y: 256, w: 128, h: 128 } },
                "FallingStar_Sprites8.png": { frame: { x: 256, y: 256, w: 128, h: 128 } }
            }
        };

        let bgFrames = Object.keys(bgData.frames)
            .sort()
            .map(key => bgData.frames[key]);

        let bgFrameIndex = 2;
        let bgCounter = 2;
        let bgSpeed = 2;

        function drawBackground() {

            const frame = bgFrames[bgFrameIndex].frame;

            ctx.drawImage(
                background,
                frame.x, frame.y, frame.w, frame.h,
                randomInt(0,canvas.height), randomInt(0,canvas.width), 128, 128
            );

            bgCounter++;
            if (bgCounter >= bgSpeed) {
                bgFrameIndex++;
                bgCounter = 0;
            }

            if (bgFrameIndex >= bgFrames.length) {
                bgFrameIndex = 0;
            }
        }

//let timegiro=0;
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);

            drawBackground();

            ctx.save();//modo o sistema di salvataggio della box e soul per poterli muovere in seguito
            ctx.translate(box.x, box.y);//muove il centro del canvas cio dove le x e y = 0
            ctx.rotate(box.angle); // angolo 0 pero lo cambiaro en seguito
            box.draw(ctx);
            soul.draw(ctx)
            bone.draw(ctx);
            //let now=Date.now();
            //if (now-timegiro>1000){
            //    box.angle+=1;
            //    timegiro=now;                    
            //} ;
            ctx.restore();//cosi ritornano allo stato iniziale
            soul.move(ctx);
            requestAnimationFrame(draw);
        }
        window.requestAnimationFrame(draw);
    </script>
</body>
</html>
