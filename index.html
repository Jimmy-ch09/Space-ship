<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceship</title>
    <style>
        body{
            background-color: black;
        }
        #canvas {
            border: 2px solid rgb(181, 181, 181);
            display: block;
            margin: 0 auto;
            position: absolute;   /* imp */
            z-index: 1; /*immagine sopra*/
        }
        .zona {
            width: 640px;
            height: 640px;
            cursor: none;
            }
        #fondo {
            width: 1000px;
            height: 1000px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0; /* fondo */
            }
    </style>

</head>
<body onkeydown="_keydown(event);" onkeyup="_keyup(event);" >
    <img src="images/misteryman.png" id="fondo">
    <canvas class="zona" id="canvas" width="1000" height="1000"></canvas>
    <script>

        class Bullet {
            x; y; vy; vx; w; h;
            constructor(x, y, vx, vy) {
                this.w=4; this.h=15;
                this.x=x; this.y=y;
                this.vx=vx; this.vy=vy;
            }
            draw() {
                ctx.fillStyle = 'rgb(150, 207, 216)';
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
            move() {
                this.x += this.vx;
                this.y += this.vy;
            }
        }
        class Bullet2 {
            x; y; vy; vx; w; h;
            constructor(x, y, vx, vy) {
                this.w=16; this.h=50;
                this.x=x; this.y=y;
                this.vx=vx; this.vy=vy;
            }
            draw() {
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
            move() {
                this.x += this.vx;
                this.y += this.vy;
            }
        }
        //nemici
        class Enemy{
            
            
        }
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const SPEED=6;
        //Immagini
        const spazioBack=new Image();
        spazioBack.src="Backgrounds/Stars_background_Black.png"//fondo

        const soulImage = new Image();
        soulImage.src="images/soul.png";//soul

        const shipImage2 = new Image();
        shipImage2.src="images/ship.png";//nave animata

        const background = new Image();
        background.src = "Backgrounds/FallingStar.png";//Stella cadente

        const bulletImg = new Image();
        bulletImg.src = "Bullet.png"//Tipo di sparo

        const box = {
            x: 400,
            y: 300,
            width: 400,
            height: 400,
            angle: 0,
            draw: function(ctx){
                ctx.strokeStyle = "gray";
                ctx.lineWidth = 4;
                ctx.strokeRect(-this.width/2, -this.height/2, this.width, this.height);
            }

            };
        function drawBoxLocal() {
            ctx.strokeStyle = "white";
            ctx.lineWidth = 4;
            ctx.strokeRect(
                -box.width/2,
                -box.height/2,
                box.width,
                box.height
            );
        }
        //stato nel gioco
        let hp=92;
        const Smovimento=true;



        function randomInt(a, b) {
            return Math.floor(Math.random() * (b - a + 1)) + a;
        }  

        let typeBullet=Bullet;
        
        //Presa dei movimenti (aggiustato)
        function _keydown(e) {
            switch (e.key) {
                case 'a':
                case 'ArrowLeft':
                    soul.vx=-SPEED;
                    break;
                case 'd':
                case 'ArrowRight':
                    soul.vx=SPEED;
                    break;
                case 'w':
                case 'ArrowUp':
                    soul.vy=-SPEED;
                    break;
                case 's':
                case 'ArrowDown':
                    soul.vy=SPEED;
                    break;
                case ' ':
                    soul.fire();
                    break;
                case 'q':
                    typeBullet=Bullet;
                    break;
                case 'e':
                    typeBullet=Bullet2;
                    break;
            }
        }

        function _keyup(e) {
            switch (e.key) {
                case 'a':
                case 'ArrowLeft':
                    if (soul.vx < 0) soul.vx = 0;
                    break;
                case 'd':
                case 'ArrowRight':
                    if (soul.vx > 0) soul.vx = 0;
                    break;
                case 'w':
                case 'ArrowUp':
                    if (soul.vy < 0) soul.vy = 0;
                    break;
                case 's':
                case 'ArrowDown':
                    if (soul.vy > 0) soul.vy = 0;
                    break;
            }
        }
        //Soul (rinominato da ship)
        const soul = {
            x:0, y:0, w:40, h:40, 
            vx:0, vy:0,
            bullets:[],//forse ancora utile
            draw: function(ctx) {
                ctx.drawImage(soulImage, this.x - this.w/2, this.y - this.h/2, this.w, this.h);
                this.bullets.forEach( (x)=>{
                    x.draw(ctx);
               } );
            },
            
            move: function(ctx) {
                //if (this.x>box.width && this.x>=box.width || this.y>=box.height){
                this.x += this.vx;
                this.y += this.vy;
                let left   = -box.width/2 + this.w/2;
                let right  = box.width/2 - this.w/2;
                let top    = -box.height/2 + this.h/2;
                let bottom = box.height/2 - this.h/2;

                if (this.x< left) this.x=left;
                if (this.x> right) this.x=right;
                if (this.y< top) this.y=top;
                if (this.y> bottom) this.y=bottom;
                
                //};
                this.bullets.forEach( (x)=>{
                    x.move(ctx);
                } );

                
            },
            fire: function() {
                let b=new typeBullet(this.x+this.w/2, this.y, 0, -3);
                this.bullets.push(b);
            }
        }

        //let b=new Bullet(ship.x+ship.w/2,ship.y,0,-3);

        //Grafica del gioco

        //Bgdata= stella cadente
        const bgData = {
            frames: {
                "FallingStar_Sprites0.png": { frame: { x: 0,   y: 0,   w: 128, h: 128 } },
                "FallingStar_Sprites1.png": { frame: { x: 128, y: 0,   w: 128, h: 128 } },
                "FallingStar_Sprites2.png": { frame: { x: 256, y: 0,   w: 128, h: 128 } },
                "FallingStar_Sprites3.png": { frame: { x: 0,   y: 128, w: 128, h: 128 } },
                "FallingStar_Sprites4.png": { frame: { x: 128, y: 128, w: 128, h: 128 } },
                "FallingStar_Sprites5.png": { frame: { x: 256, y: 128, w: 128, h: 128 } },
                "FallingStar_Sprites6.png": { frame: { x: 0,   y: 256, w: 128, h: 128 } },
                "FallingStar_Sprites7.png": { frame: { x: 128, y: 256, w: 128, h: 128 } },
                "FallingStar_Sprites8.png": { frame: { x: 256, y: 256, w: 128, h: 128 } }
            }
        };

        let bgFrames = Object.keys(bgData.frames)
            .sort()
            .map(key => bgData.frames[key]);

        let bgFrameIndex = 0;
        let bgCounter = 0;
        let bgSpeed = 2;

        function drawBackground() {

            const frame = bgFrames[bgFrameIndex].frame;

            ctx.drawImage(
                background,
                frame.x, frame.y, frame.w, frame.h,
                randomInt(0,canvas.height), randomInt(0,canvas.width), 128, 128
            );

            bgCounter++;
            if (bgCounter >= bgSpeed) {
                bgFrameIndex++;
                bgCounter = 0;
            }

            if (bgFrameIndex >= bgFrames.length) {
                bgFrameIndex = 0;
            }
        }



        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);

            drawBackground();

            ctx.save();//modo o sistema di salvataggio della box e soul per poterli muovere in seguito
            ctx.translate(box.x, box.y);
            ctx.rotate(box.angle); // angolo 0 pero lo cambiaro en seguito
            box.draw(ctx);
            soul.draw(ctx)
            ctx.restore();//cosi ritornano allo stato iniziale

            soul.move(ctx);
            requestAnimationFrame(draw);
        }
        window.requestAnimationFrame(draw);
    </script>
</body>
</html>
