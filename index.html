<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceship</title>
    <style>
        #canvas {
            border: 2px solid black;
            background-color: blue;
        }
    </style>

</head>
<body onkeydown="_keydown(event);" onkeyup="_keyup(event);" >
    <canvas  id="canvas" width="400" height="400"></canvas>
    <script>

        class Bullet {
            x; y; vy; vx; w; h;
            constructor(x, y, vx, vy) {
                this.w=4; this.h=15;
                this.x=x; this.y=y;
                this.vx=vx; this.vy=vy;
            }
            draw() {
                ctx.fillStyle = 'rgb(150, 207, 216)';
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
            move() {
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const SPEED=2;

        const shipImage = new Image();
        shipImage.src="ship.png";

        const background = new Image();
        background.src = "Backgrounds/FallingStar.png";//Fondo animato

        function randomInt(a, b) {
            return Math.floor(Math.random() * (b - a + 1)) + a;
        }


        

        function _keydown(e) {
            switch (e.key) {
                case 'ArrowLeft':
                    ship.vx=-SPEED;
                    break;
                case 'ArrowRight':
                    ship.vx=SPEED;
                    break;
                case 'ArrowUp':
                    ship.vy=-SPEED;
                    break;
                case 'ArrowDown':
                    ship.vy=SPEED;
                    break;
                case ' ':
                    ship.fire();
                    break;
            }
        }

        function _keyup(e) {
            switch (e.key) {
                case 'ArrowLeft':
                    ship.vx=0;
                    break;
                case 'ArrowRight':
                    ship.vx=0;
                    break;
                case 'ArrowUp':
                    ship.vy=0;
                    break;
                case 'ArrowDown':
                    ship.vy=0;
                    break;
            }
        }

        const ship = {
            x:200, y:360, w:40, h:40, 
            vx:0, vy:0,
            bullets:[],
            draw: function(ctx) {
               ctx.drawImage(shipImage, this.x, this.y, this.w, this.h);
               this.bullets.forEach( (x)=>{
                    x.draw(ctx);
               } );
            },
            move: function(ctx) {
                this.x += this.vx;
                this.y += this.vy;
                this.bullets.forEach( (x)=>{
                    x.move(ctx);
                } );
            },
            fire: function() {
                let b=new Bullet(this.x+this.w/2, this.y, 0, -3);
                this.bullets.push(b);
            }
        }

        //let b=new Bullet(ship.x+ship.w/2,ship.y,0,-3);
        const bgData = {
            frames: {
                "FallingStar_Sprites0.png": { frame: { x: 0,   y: 0,   w: 128, h: 128 } },
                "FallingStar_Sprites1.png": { frame: { x: 128, y: 0,   w: 128, h: 128 } },
                "FallingStar_Sprites2.png": { frame: { x: 256, y: 0,   w: 128, h: 128 } },
                "FallingStar_Sprites3.png": { frame: { x: 0,   y: 128, w: 128, h: 128 } },
                "FallingStar_Sprites4.png": { frame: { x: 128, y: 128, w: 128, h: 128 } },
                "FallingStar_Sprites5.png": { frame: { x: 256, y: 128, w: 128, h: 128 } },
                "FallingStar_Sprites6.png": { frame: { x: 0,   y: 256, w: 128, h: 128 } },
                "FallingStar_Sprites7.png": { frame: { x: 128, y: 256, w: 128, h: 128 } },
                "FallingStar_Sprites8.png": { frame: { x: 256, y: 256, w: 128, h: 128 } }
            }
        };

        let bgFrames = Object.keys(bgData.frames)
            .sort()
            .map(key => bgData.frames[key]);

        let bgFrameIndex = 0;
        let bgCounter = 0;
        let bgSpeed = 2;

        function drawBackground() {

            const frame = bgFrames[bgFrameIndex].frame;

            ctx.drawImage(
                background,
                frame.x, frame.y, frame.w, frame.h,
                randomInt(0,300), randomInt(0,300), 128, 128
            );

            bgCounter++;
            if (bgCounter >= bgSpeed) {
                bgFrameIndex++;
                bgCounter = 0;
            }

            if (bgFrameIndex >= bgFrames.length) {
                bgFrameIndex = 0;
            }
        }



        function draw() {
            ctx.clearRect(0,0,400,400);
            drawBackground();
            ship.draw(ctx);
            ship.move(ctx);
            window.requestAnimationFrame(draw);
        }
        window.requestAnimationFrame(draw);
    </script>
</body>
</html>
